<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL SAR // C2 PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        sar: { DEFAULT: '#ff5722', dark: '#d84315', glow: 'rgba(255, 87, 34, 0.5)' },
                        panel: '#111827',
                        bgdark: '#0b0f19'
                    }
                }
            }
        }
    </script>

    <style>
        /* Transición suave para el cambio de tema */
        .transition-theme { transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        
        /* Ocultar barra de desplazamiento pero mantener funcionalidad */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>

<body class="bg-slate-100 dark:bg-bgdark text-slate-800 dark:text-slate-300 h-screen flex flex-col overflow-hidden transition-theme">

    <header class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-panel flex items-center justify-between px-6 shrink-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-sar rounded flex items-center justify-center shadow-lg shadow-sar/20">
                <i class="ph-bold ph-broadcast text-white text-xl"></i>
            </div>
            <div>
                <h1 class="font-mono font-bold tracking-tighter text-lg leading-none">SAR AI SYSTEM</h1>
                <span id="sysState" class="text-[10px] font-mono text-green-500 uppercase tracking-widest">SISTEMA EN LÍNEA</span>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button id="themeToggle" class="p-2 rounded-lg bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:scale-110 transition-all">
                <i id="themeIcon" class="ph ph-moon-stars text-xl"></i>
            </button>
            <div class="h-8 w-[1px] bg-slate-200 dark:border-slate-800"></div>
            <div class="text-right hidden sm:block">
                <p class="text-[10px] font-mono opacity-50 uppercase">Operación Local</p>
                <p id="clock" class="text-xs font-mono font-bold">00:00:00 UTC</p>
            </div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        
        <aside class="w-80 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-panel p-6 flex flex-col gap-6 overflow-y-auto shrink-0 transition-theme">
            
            <section class="space-y-3">
                <label class="text-[10px] font-mono font-bold uppercase tracking-wider text-slate-500">Enlace de Comunicación (API)</label>
                <input type="text" id="apiUrl" 
                    placeholder="https://xyz.trycloudflare.com"
                    class="w-full bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg p-3 text-xs font-mono outline-none focus:border-sar transition-all">
            </section>

            <section class="space-y-4">
                <label class="text-[10px] font-mono font-bold uppercase tracking-wider text-slate-500">Configuración de IA</label>
                
                <div class="space-y-2">
                    <p class="text-xs">Modelo Operativo</p>
                    <select id="modelSelect" class="w-full bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg p-2 text-xs outline-none focus:border-sar">
                        <option value="YOLO v12">YOLO v12 (Precision+)</option>
                        <option value="YOLO v8">YOLO v8 (Balanced)</option>
                        <option value="YOLO v5">YOLO v5 (Legacy)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between">
                        <p class="text-xs">Confianza</p>
                        <span id="confValue" class="text-xs font-mono text-sar">0.35</span>
                    </div>
                    <input type="range" id="confSlider" min="0.1" max="0.9" step="0.05" value="0.35"
                        class="w-full accent-sar h-1 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer">
                </div>
            </section>

            <section class="flex-1 flex flex-col gap-4">
                <label class="text-[10px] font-mono font-bold uppercase tracking-wider text-slate-500">Entrada de Datos</label>
                
                <div id="dropZone" class="flex-1 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl flex flex-col items-center justify-center p-4 hover:border-sar/50 transition-colors cursor-pointer group">
                    <input type="file" id="fileInput" class="hidden" accept="image/*,video/*">
                    <i class="ph ph-cloud-arrow-up text-4xl mb-2 text-slate-400 group-hover:text-sar group-hover:scale-110 transition-all"></i>
                    <p class="text-[10px] text-center uppercase font-mono text-slate-500">Arrastra archivos o haz clic aquí</p>
                    <p id="fileName" class="text-[10px] mt-2 text-sar font-bold truncate max-w-full"></p>
                </div>

                <button id="btnProcess" class="w-full bg-sar hover:bg-sar-dark text-white font-mono font-bold py-4 rounded-xl shadow-lg shadow-sar/20 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                    INICIAR ANÁLISIS
                </button>
            </section>

        </aside>

        <section class="flex-1 p-8 flex items-center justify-center relative bg-slate-50 dark:bg-bgdark transition-theme overflow-auto">
            
            <div id="resultContainer" class="relative max-w-full max-h-full flex items-center justify-center rounded-2xl overflow-hidden bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-2xl transition-all duration-500 min-h-[400px] min-w-[300px]">
                
                <div id="placeholder" class="flex flex-col items-center gap-4 p-20 opacity-30">
                    <i class="ph ph-scan-eye text-8xl"></i>
                    <p class="font-mono text-sm tracking-[0.2em]">SIN SEÑAL DE VÍDEO</p>
                </div>

                <img id="resultImage" class="hidden max-w-full max-h-[80vh] object-contain" src="" alt="Resultado">
                <video id="resultVideo" class="hidden max-w-full max-h-[80vh] object-contain" controls autoplay loop muted></video>

                <div id="loadingOverlay" class="absolute inset-0 bg-slate-100/80 dark:bg-bgdark/80 hidden items-center justify-center flex-col gap-4 backdrop-blur-sm z-10">
                    <div class="w-12 h-12 border-4 border-slate-300 border-t-sar rounded-full animate-spin"></div>
                    <p class="font-mono text-xs animate-pulse">PROCESANDO FRAME POR FRAME...</p>
                </div>
            </div>

            <button id="btnDownload" class="absolute bottom-12 right-12 p-4 bg-green-600 text-white rounded-full shadow-xl hidden hover:scale-110 transition-all active:scale-95">
                <i class="ph-bold ph-download-simple text-2xl"></i>
            </button>
        </section>

    </main>

    <script>
        // --- ELEMENTOS ---
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const htmlElement = document.documentElement;
        
        const btnProcess = document.getElementById('btnProcess');
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const resultImage = document.getElementById('resultImage');
        const resultVideo = document.getElementById('resultVideo');
        const placeholder = document.getElementById('placeholder');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const apiUrlInput = document.getElementById('apiUrl');
        const sysState = document.getElementById('sysState');

        // --- MODO OSCURO / CLARO ---
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            htmlElement.classList.add('dark');
            themeIcon.classList.replace('ph-moon-stars', 'ph-sun');
        }

        themeToggle.addEventListener('click', () => {
            if (htmlElement.classList.contains('dark')) {
                htmlElement.classList.remove('dark');
                localStorage.theme = 'light';
                themeIcon.classList.replace('ph-sun', 'ph-moon-stars');
            } else {
                htmlElement.classList.add('dark');
                localStorage.theme = 'dark';
                themeIcon.classList.replace('ph-moon-stars', 'ph-sun');
            }
        });

        // --- RELOJ ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toISOString().split('T')[1].split('.')[0] + ' UTC';
        }, 1000);

        // --- MANEJO DE ARCHIVOS ---
        let selectedFile = null;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            selectedFile = e.target.files[0];
            if(selectedFile) document.getElementById('fileName').textContent = selectedFile.name;
        };

        // --- LOGICA DE PROCESAMIENTO ---
        btnProcess.addEventListener('click', async () => {
            let baseUrl = apiUrlInput.value.trim();
            if (!baseUrl) return alert("Por favor, introduce la URL de Cloudflare");
            if (!selectedFile) return alert("Selecciona una imagen o vídeo primero");
            
            // Limpieza de URL
            if (baseUrl.endsWith('/')) baseUrl = baseUrl.slice(0, -1);

            // UI State
            loadingOverlay.classList.remove('hidden');
            loadingOverlay.classList.add('flex');
            placeholder.classList.add('hidden');
            resultImage.classList.add('hidden');
            resultVideo.classList.add('hidden');
            sysState.textContent = "ANALIZANDO...";
            sysState.className = "text-[10px] font-mono text-sar animate-pulse";

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('modelo', document.getElementById('modelSelect').value);
            formData.append('conf', document.getElementById('confSlider').value);

            const isVideo = selectedFile.type.startsWith('video');
            const endpoint = isVideo ? '/analizar_video/' : '/analizar_imagen/';

            try {
                const response = await fetch(`${baseUrl}${endpoint}`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("Fallo en el servidor");

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);

                if (isVideo) {
                    resultVideo.src = url;
                    resultVideo.classList.remove('hidden');
                } else {
                    resultImage.src = url;
                    resultImage.classList.remove('hidden');
                }

                sysState.textContent = "ANÁLISIS COMPLETADO";
                sysState.className = "text-[10px] font-mono text-green-500";
                
                // Activar descarga
                const btnDl = document.getElementById('btnDownload');
                btnDl.classList.remove('hidden');
                btnDl.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `sar_detect_${selectedFile.name}`;
                    a.click();
                };

            } catch (err) {
                console.error(err);
                alert("Error de comunicación. Comprueba el túnel de Cloudflare y el CORS.");
                sysState.textContent = "ERROR DE CONEXIÓN";
                sysState.className = "text-[10px] font-mono text-red-500";
                placeholder.classList.remove('hidden');
            } finally {
                loadingOverlay.classList.add('hidden');
                loadingOverlay.classList.remove('flex');
            }
        });

        // Slider sync
        document.getElementById('confSlider').addEventListener('input', (e) => {
            document.getElementById('confValue').textContent = e.target.value;
        });
    </script>
</body>
</html>
